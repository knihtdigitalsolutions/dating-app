version: '3.9'

services:
  postgres:
    image: ankane/pgvector:latest
    container_name: dating-postgres
    ports:
      - '5432:5432'
    environment:
      POSTGRES_USER: dating
      POSTGRES_PASSWORD: dating_dev_password
      POSTGRES_DB: dating_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U dating']
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: dating-redis
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 5

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: dating-api
    ports:
      - '4000:4000'
    environment:
      NODE_ENV: development
      DATABASE_URL: postgresql://dating:dating_dev_password@postgres:5432/dating_db
      REDIS_URL: redis://redis:6379
    env_file:
      - apps/api/.env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:
